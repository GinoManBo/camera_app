<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Camara -> PC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #000; color: #fff;
    font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  #video { width: 100vw; height: 100vh; object-fit: cover; background: #000; }
  #ui { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; padding: 24px;
    pointer-events: none; }
  .row { display: flex; gap: 12px; pointer-events: auto; margin-bottom: 16px; }
  button { font-size: 17px; font-weight: 600; padding: 14px 22px; border: none;
    border-radius: 999px; background: #2b7; color: #fff; }
  button.sec { background: #444; }
  button:disabled { opacity: .4; }
  #status { position: fixed; top: 0; left: 0; right: 0; padding: 10px;
    text-align: center; background: rgba(0,0,0,.6); font-size: 14px; }
  .live { color: #2f6; }
  .err { color: #f66; }
</style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <div id="status">Pulsa Iniciar</div>
  <div id="ui">
    <div class="row">
      <button id="start">Iniciar</button>
      <button id="flip" class="sec" disabled>Girar camara</button>
      <button id="stop" class="sec" disabled>Detener</button>
    </div>
  </div>

<canvas id="canvas" style="display:none"></canvas>
<script>
const W = 1280, H = 720, FPS = 30, QUALITY = 0.6;

const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const elStart = document.getElementById('start');
const elStop  = document.getElementById('stop');
const elFlip  = document.getElementById('flip');
const elStatus = document.getElementById('status');

canvas.width = W; canvas.height = H;

let stream = null, ws = null, sending = false, facing = 'environment';

function setStatus(t, cls) {
  elStatus.textContent = t;
  elStatus.className = cls || '';
}

async function openCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: facing, width: { ideal: W }, height: { ideal: H } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
}

function connectWS() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(`wss://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';
    ws.onopen = () => resolve();
    ws.onerror = () => reject(new Error('No se pudo conectar al PC'));
    ws.onclose = () => { if (sending) stop(); };
  });
}

function loop() {
  if (!sending) return;
  // Backpressure: no acumular si el socket va lleno.
  if (ws.readyState === WebSocket.OPEN && ws.bufferedAmount < 1_000_000) {
    ctx.drawImage(video, 0, 0, W, H);
    canvas.toBlob(b => {
      if (b && ws.readyState === WebSocket.OPEN) b.arrayBuffer().then(buf => ws.send(buf));
    }, 'image/jpeg', QUALITY);
  }
  setTimeout(loop, 1000 / FPS);
}

async function start() {
  try {
    elStart.disabled = true;
    setStatus('Abriendo camara...');
    await openCamera();
    setStatus('Conectando al PC...');
    await connectWS();
    sending = true;
    elStop.disabled = false; elFlip.disabled = false;
    setStatus('EN VIVO — enviando al PC', 'live');
    loop();
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
    elStart.disabled = false;
  }
}

function stop() {
  sending = false;
  if (ws) { try { ws.close(); } catch (e) {} ws = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  video.srcObject = null;
  elStart.disabled = false; elStop.disabled = true; elFlip.disabled = true;
  setStatus('Detenido');
}

async function flip() {
  facing = facing === 'environment' ? 'user' : 'environment';
  try { await openCamera(); } catch (e) { setStatus('Error: ' + e.message, 'err'); }
}

elStart.onclick = start;
elStop.onclick = stop;
elFlip.onclick = flip;

// Mantiene la pantalla encendida si el navegador lo soporta.
if ('wakeLock' in navigator) {
  document.addEventListener('click', () => navigator.wakeLock.request('screen').catch(()=>{}), { once: true });
}
</script>
</body>
</html>
